<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>せどり管理</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800&family=JetBrains+Mono:wght@400;600&display=swap');

  :root {
    --bg: #0f1117; --surface: #1a1d27; --card: #22263a; --border: #2e3350;
    --accent: #ff4d6d; --accent2: #4df7a2; --accent3: #ffd166;
    --text: #e8eaf6; --muted: #7c82a8; --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'M PLUS Rounded 1c', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 80px; }

  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 16px; position: sticky; top: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; }
  header h1 { font-size: 1.1rem; font-weight: 800; }
  header h1 span { color: var(--accent); }

  .tabs { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 49px; z-index: 99; }
  .tab { flex: 1; padding: 11px 4px; text-align: center; font-size: 0.75rem; font-weight: 700; border: none; background: none; color: var(--muted); cursor: pointer; border-bottom: 3px solid transparent; transition: all 0.2s; }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .page { display: none; padding: 14px; }
  .page.active { display: block; }

  /* サマリー */
  .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
  .sum-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; }
  .sum-card .label { font-size: 0.7rem; color: var(--muted); margin-bottom: 3px; }
  .sum-card .value { font-size: 1.2rem; font-weight: 800; font-family: 'JetBrains Mono', monospace; }
  .sum-card.profit .value { color: var(--accent2); }
  .sum-card.revenue .value { color: var(--accent3); }
  .sum-card.items .value { color: #7eb8ff; }
  .sum-card.roi .value { color: var(--accent); }

  /* トグル */
  .mode-toggle { display: flex; background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 3px; margin-bottom: 12px; gap: 3px; }
  .mode-btn { flex: 1; padding: 7px; border: none; border-radius: 7px; font-family: inherit; font-size: 0.78rem; font-weight: 700; cursor: pointer; transition: all 0.2s; background: transparent; color: var(--muted); }
  .mode-btn.active { background: var(--accent); color: #fff; }

  /* フォーム */
  .form-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 14px; }
  .form-card h2 { font-size: 0.8rem; font-weight: 700; margin-bottom: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .form-row.single { grid-template-columns: 1fr; }
  .form-row.triple { grid-template-columns: 1fr 1fr 1fr; }
  label { font-size: 0.7rem; color: var(--muted); display: block; margin-bottom: 3px; }
  input, select { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: inherit; font-size: 0.88rem; padding: 9px 10px; transition: border-color 0.2s; -webkit-appearance: none; }
  input:focus, select:focus { outline: none; border-color: var(--accent); }
  input[type=number] { font-family: 'JetBrains Mono', monospace; }

  /* 計算プレビュー */
  .calc-preview { background: var(--surface); border: 1px solid var(--accent); border-radius: 10px; padding: 10px 12px; margin: 8px 0; display: grid; grid-template-columns: 1fr 1fr; gap: 4px 12px; }
  .calc-row { display: flex; justify-content: space-between; align-items: center; }
  .calc-row span:first-child { font-size: 0.72rem; color: var(--muted); }
  .calc-row span:last-child { font-family: 'JetBrains Mono', monospace; font-size: 0.82rem; font-weight: 600; }
  .calc-row.profit span:last-child { color: var(--accent2); font-size: 0.95rem; }
  .calc-row.loss span:last-child { color: var(--accent); font-size: 0.95rem; }
  .calc-row.roi span:last-child { color: var(--accent3); }

  /* ボタン */
  .btn { padding: 11px 18px; border: none; border-radius: 10px; font-family: inherit; font-weight: 700; font-size: 0.88rem; cursor: pointer; transition: all 0.2s; }
  .btn-primary { background: var(--accent); color: #fff; width: 100%; margin-top: 6px; }
  .btn-primary:active { opacity: 0.85; transform: scale(0.98); }
  .btn-sm { padding: 6px 11px; font-size: 0.72rem; border-radius: 6px; }
  .btn-ghost { background: var(--surface); color: var(--muted); border: 1px solid var(--border); }
  .btn-danger { background: rgba(255,77,109,0.15); color: var(--accent); border: 1px solid rgba(255,77,109,0.3); }
  .btn-blue { background: rgba(126,184,255,0.15); color: #7eb8ff; border: 1px solid rgba(126,184,255,0.3); }

  /* 在庫リスト（コンパクト版） */
  .item-list { display: flex; flex-direction: column; gap: 8px; }
  .item-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; border-left: 3px solid var(--accent3); }
  .item-card.sold { border-left-color: var(--accent2); }
  .item-header { display: flex; justify-content: space-between; align-items: center; gap: 6px; margin-bottom: 6px; }
  .item-name { font-weight: 700; font-size: 0.9rem; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .badge { font-size: 0.62rem; font-weight: 700; padding: 2px 7px; border-radius: 20px; white-space: nowrap; }
  .badge-sold { background: rgba(77,247,162,0.15); color: var(--accent2); border: 1px solid rgba(77,247,162,0.3); }
  .badge-unsold { background: rgba(255,209,102,0.15); color: var(--accent3); border: 1px solid rgba(255,209,102,0.3); }

  /* コンパクト数値行 */
  .item-nums { display: flex; gap: 10px; margin-bottom: 8px; align-items: center; flex-wrap: wrap; }
  .item-num { font-size: 0.72rem; color: var(--muted); }
  .item-num span { font-family: 'JetBrains Mono', monospace; font-weight: 700; color: var(--text); font-size: 0.82rem; }
  .item-num span.green { color: var(--accent2); }
  .item-num span.red { color: var(--accent); }
  .item-num span.muted { color: var(--muted); font-size: 0.72rem; }

  .item-meta { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
  .meta-tag { font-size: 0.67rem; color: var(--muted); background: var(--surface); border-radius: 4px; padding: 2px 6px; }

  .item-actions { display: flex; gap: 6px; }

  /* 絞り込みバー */
  .filter-bar { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
  .filter-bar select, .filter-bar input { flex: 1; min-width: 90px; padding: 8px 10px; font-size: 0.8rem; }

  /* グラフ */
  .chart-section { margin-bottom: 18px; }
  .chart-section h2 { font-size: 0.8rem; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
  .chart-wrap { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; }
  canvas { width: 100% !important; }

  /* カテゴリバー */
  .cat-bar-wrap { display: flex; flex-direction: column; gap: 10px; }
  .cat-bar-header { display: flex; justify-content: space-between; font-size: 0.8rem; margin-bottom: 3px; }
  .cat-bar-header span:last-child { font-family: 'JetBrains Mono', monospace; color: var(--accent2); font-weight: 600; }
  .bar-track { background: var(--surface); border-radius: 99px; height: 7px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, var(--accent2), #06d6a0); }

  /* 売れた履歴 */
  .sold-section { margin-top: 18px; }
  .sold-section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; cursor: pointer; }
  .sold-section-header h2 { font-size: 0.8rem; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
  .sold-toggle-icon { font-size: 0.8rem; color: var(--muted); transition: transform 0.2s; }
  .sold-list { display: flex; flex-direction: column; gap: 8px; }

  /* 月選択 */
  .month-selector { display: flex; align-items: center; gap: 10px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 8px 12px; margin-bottom: 12px; }
  .month-selector button { background: none; border: none; color: var(--muted); font-size: 1.1rem; cursor: pointer; }
  .month-selector span { flex: 1; text-align: center; font-weight: 700; font-size: 0.88rem; }

  /* 別売れ別サマリー */
  .split-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
  .split-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; }
  .split-card.sedori { border-left: 3px solid var(--accent2); }
  .split-card.fuyohin { border-left: 3px solid #7eb8ff; }
  .split-card .sc-title { font-size: 0.68rem; font-weight: 700; margin-bottom: 8px; }
  .split-card.sedori .sc-title { color: var(--accent2); }
  .split-card.fuyohin .sc-title { color: #7eb8ff; }
  .split-card .sc-profit { font-family: 'JetBrains Mono', monospace; font-size: 1.05rem; font-weight: 800; }
  .split-card.sedori .sc-profit { color: var(--accent2); }
  .split-card.fuyohin .sc-profit { color: #7eb8ff; }
  .split-card .sc-sub { font-size: 0.68rem; color: var(--muted); margin-top: 4px; }

  /* モーダル */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; align-items: flex-end; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border-radius: 20px 20px 0 0; padding: 18px; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; border: 1px solid var(--border); }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .modal-header h3 { font-size: 0.98rem; font-weight: 800; }
  .modal-close { background: none; border: none; color: var(--muted); font-size: 1.3rem; cursor: pointer; }

  /* section header */
  .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .section-header h2 { font-size: 0.8rem; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }

  /* トースト */
  .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: var(--accent2); color: #0f1117; font-weight: 700; padding: 10px 20px; border-radius: 99px; font-size: 0.82rem; z-index: 300; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; }
  .toast.show { opacity: 1; }

  /* 空状態 */
  .empty { text-align: center; padding: 32px 16px; color: var(--muted); font-size: 0.88rem; }
  .empty .icon { font-size: 2.2rem; margin-bottom: 8px; }

  @media (max-width: 360px) {
    .summary-grid { grid-template-columns: 1fr; }
    .split-cards { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <h1>せどり<span>管理</span></h1>
  <div style="font-size:0.72rem; color:var(--muted);" id="headerDate"></div>
</header>

<div class="tabs">
  <button class="tab active" onclick="showPage('add')">➕ 登録</button>
  <button class="tab" onclick="showPage('list')">📦 在庫</button>
  <button class="tab" onclick="showPage('stats')">📊 分析</button>
  <button class="tab" onclick="showPage('data')">💾 データ</button>
</div>

<!-- ========== 登録ページ ========== -->
<div class="page active" id="page-add">

  <div class="mode-toggle">
    <button class="mode-btn active" id="toggle-all" onclick="setSummaryMode('all')">全体</button>
    <button class="mode-btn" id="toggle-sedori" onclick="setSummaryMode('sedori')">せどり</button>
    <button class="mode-btn" id="toggle-fuyohin" onclick="setSummaryMode('fuyohin')">不用品</button>
  </div>

  <div class="summary-grid">
    <div class="sum-card profit"><div class="label" id="s-label-profit">今月利益</div><div class="value" id="s-profit">¥0</div></div>
    <div class="sum-card revenue"><div class="label" id="s-label-revenue">今月売上</div><div class="value" id="s-revenue">¥0</div></div>
    <div class="sum-card items"><div class="label">在庫数</div><div class="value" id="s-unsold">0件</div></div>
    <div class="sum-card roi"><div class="label" id="s-label-roi">今月ROI</div><div class="value" id="s-roi">0%</div></div>
  </div>

  <div class="form-card">
    <h2>仕入れ登録</h2>
    <div class="form-row single">
      <div><label>商品名</label><input type="text" id="f-name" placeholder="例：ポケモンカード 旧裏 リザードン" /></div>
    </div>
    <div class="form-row">
      <div><label>仕入れ値 ¥</label><input type="number" id="f-cost" placeholder="0" min="0" /></div>
      <div><label>仕入れ日</label><input type="date" id="f-date" /></div>
    </div>
    <div class="form-row">
      <div><label>カテゴリ</label>
        <select id="f-cat">
          <option value="レトロゲーム">レトロゲーム</option>
          <option value="トレカ">トレカ</option>
          <option value="ブランド品">ブランド品</option>
          <option value="古着">古着</option>
          <option value="電子機器">電子機器</option>
          <option value="本・漫画">本・漫画</option>
          <option value="おもちゃ">おもちゃ</option>
          <option value="その他">その他</option>
        </select>
      </div>
      <div><label>仕入れ先</label>
        <select id="f-source">
          <option value="不用品">不用品</option>
          <option value="ハードオフ">ハードオフ</option>
          <option value="ブックオフ">ブックオフ</option>
          <option value="メルカリ">メルカリ</option>
          <option value="ヤフオク">ヤフオク</option>
          <option value="リサイクルショップ">リサイクルショップ</option>
          <option value="フリマ">フリマ</option>
          <option value="その他">その他</option>
        </select>
      </div>
    </div>
    <div class="form-row single">
      <div><label>メモ</label><input type="text" id="f-memo" placeholder="コンディション、保管場所など" /></div>
    </div>
    <button class="btn btn-primary" onclick="addItem()">仕入れ登録する</button>
    <button class="btn btn-ghost" onclick="openShippingModal()" style="width:100%; margin-top:8px; text-align:center;">📦 送料を確認する</button>
  </div>
</div>

<!-- ========== 在庫ページ ========== -->
<div class="page" id="page-list">
  <div class="filter-bar">
    <select id="filter-status" onchange="renderList()">
      <option value="unsold">未販売</option>
      <option value="">全て</option>
      <option value="sold">売れた</option>
    </select>
    <select id="filter-cat" onchange="renderList()">
      <option value="">全カテゴリ</option>
    </select>
    <input type="text" id="filter-search" placeholder="🔍 検索" oninput="renderList()" style="flex:2;" />
  </div>
  <div class="item-list" id="itemList">
    <div class="empty"><div class="icon">📦</div>まだ商品がありません</div>
  </div>
</div>

<!-- ========== 分析ページ ========== -->
<div class="page" id="page-stats">
  <div class="month-selector">
    <button onclick="changeStatsMonth(-1)">◀</button>
    <span id="statsMonthLabel"></span>
    <button onclick="changeStatsMonth(1)">▶</button>
  </div>

  <!-- 全体サマリー -->
  <div style="font-size:0.7rem;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;">📊 全体</div>
  <div class="summary-grid" style="margin-bottom:12px;">
    <div class="sum-card profit"><div class="label">利益</div><div class="value" id="st-profit">¥0</div></div>
    <div class="sum-card revenue"><div class="label">売上</div><div class="value" id="st-revenue">¥0</div></div>
    <div class="sum-card items"><div class="label">販売数</div><div class="value" id="st-count">0件</div></div>
    <div class="sum-card roi"><div class="label">ROI</div><div class="value" id="st-roi">0%</div></div>
  </div>

  <!-- せどり・不用品別 -->
  <div class="split-cards">
    <div class="split-card sedori">
      <div class="sc-title">📦 せどり</div>
      <div class="sc-profit" id="st-sedori-profit">¥0</div>
      <div class="sc-sub">売上 <span id="st-sedori-revenue" style="color:var(--accent3);font-family:'JetBrains Mono',monospace;">¥0</span></div>
      <div class="sc-sub"><span id="st-sedori-count">0件</span> / ROI <span id="st-sedori-roi">0%</span></div>
    </div>
    <div class="split-card fuyohin">
      <div class="sc-title">🏠 不用品</div>
      <div class="sc-profit" id="st-fuyohin-profit">¥0</div>
      <div class="sc-sub">売上 <span id="st-fuyohin-revenue" style="color:var(--accent3);font-family:'JetBrains Mono',monospace;">¥0</span></div>
      <div class="sc-sub"><span id="st-fuyohin-count">0件</span></div>
    </div>
  </div>

  <div class="chart-section">
    <h2>月別 利益推移（全体）</h2>
    <div class="chart-wrap"><canvas id="monthChart" height="150"></canvas></div>
  </div>

  <div class="chart-section">
    <h2>せどり / 不用品 比較</h2>
    <div class="chart-wrap"><canvas id="splitChart" height="130"></canvas></div>
  </div>

  <div class="chart-section">
    <h2>カテゴリ別 利益</h2>
    <div class="chart-wrap"><div class="cat-bar-wrap" id="catBars"><div class="empty" style="padding:16px;"><div class="icon">📊</div>データなし</div></div></div>
  </div>

  <!-- 売れた履歴 -->
  <div class="sold-section">
    <div class="sold-section-header" onclick="toggleSoldList()">
      <h2>🎉 売れた履歴</h2>
      <span class="sold-toggle-icon" id="soldToggleIcon">▼</span>
    </div>
    <div id="soldListWrap" style="display:none;">
      <div class="filter-bar" style="margin-bottom:10px;">
        <select id="sold-filter-cat" onchange="renderSoldList()"><option value="">全カテゴリ</option></select>
        <input type="text" id="sold-filter-search" placeholder="🔍 検索" oninput="renderSoldList()" style="flex:2;" />
      </div>
      <div class="sold-list" id="soldList"></div>
    </div>
  </div>
</div>

<!-- ========== データページ ========== -->
<div class="page" id="page-data">
  <div class="form-card">
    <h2>💾 バックアップ</h2>
    <p style="font-size:0.78rem;color:var(--muted);margin-bottom:12px;">データをJSONファイルに保存します。</p>
    <button class="btn btn-primary" onclick="exportBackup()" style="margin-bottom:10px;">📥 バックアップを保存（JSON）</button>
    <div style="border-top:1px solid var(--border);padding-top:12px;margin-top:2px;">
      <p style="font-size:0.78rem;color:var(--muted);margin-bottom:8px;">⚠️ 復元すると現在のデータは上書きされます</p>
      <label for="importFile" class="btn btn-ghost btn-primary" style="display:block;text-align:center;cursor:pointer;background:var(--surface);color:var(--text);border:1px dashed var(--border);">
        📤 バックアップから復元（JSON）
      </label>
      <input type="file" id="importFile" accept=".json" style="display:none;" onchange="importBackup(event)" />
    </div>
  </div>

  <div class="form-card">
    <h2>📋 CSV出力（スプレッドシート用）</h2>
    <p style="font-size:0.78rem;color:var(--muted);margin-bottom:12px;">Googleスプレッドシートにそのまま貼り付けられます。</p>
    <div class="form-row">
      <div><label>開始月</label><input type="month" id="csv-from" /></div>
      <div><label>終了月</label><input type="month" id="csv-to" /></div>
    </div>
    <div style="display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap;">
      <label style="display:flex;align-items:center;gap:6px;font-size:0.82rem;color:var(--text);">
        <input type="radio" name="csv-target" value="sold" checked style="width:auto;"> 売れた商品のみ
      </label>
      <label style="display:flex;align-items:center;gap:6px;font-size:0.82rem;color:var(--text);">
        <input type="radio" name="csv-target" value="all" style="width:auto;"> 全商品
      </label>
    </div>
    <button class="btn btn-primary" onclick="exportCSV()">📊 CSVダウンロード</button>
    <div style="margin-top:12px;border-top:1px solid var(--border);padding-top:12px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
        <label style="margin:0;font-size:0.72rem;color:var(--muted);">プレビュー（先頭5件）</label>
        <button class="btn btn-sm btn-ghost" onclick="copyCSV()">📋 全件コピー</button>
      </div>
      <div id="csv-preview" style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px;overflow-x:auto;font-f
